name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatch

      - name: Set version
        run: hatch version ${{ inputs.version || github.ref_name }}

      - name: Build package
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
